name: 手动/自动 编译APK
on:
  push:
    branches: [ master ]
  workflow_dispatch:    # 👈 加了这个 = 支持手动点击编译

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 赋予权限
        run: chmod +x gradlew

      - name: 编译（禁用守护进程，超快）
        run: ./gradlew assembleDebug --no-daemon --no-build-cache

      - name: 上传APK到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build-${{ github.run_number }}
          name: AnExplorer 编译完成
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
